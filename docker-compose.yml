services:
  web:
    build:
      context: .
    ports:
      - "8073:8000"
    environment:
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: "abc.xyz.com"
      DJANGO_SECRET_KEY: "change-me-before-production"
      FILESHARE_ENABLE_ADMIN_TODO: "0"
      GUNICORN_WORKERS: "3"
      GUNICORN_TIMEOUT: "120"
    volumes:
      - ./data:/app/storage
    restart: unless-stopped


