services:
  web:
    build:
      context: .
    image: fileshare-app:latest
    ports:
      - "8000:8000"
    environment:
      DJANGO_DEBUG: "0"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1"
      DJANGO_SECRET_KEY: "change-me-before-production"
      FILESHARE_DATA_ROOT: "/data"
      GUNICORN_WORKERS: "3"
      GUNICORN_TIMEOUT: "120"
    volumes:
      - fileshare_data:/data
    restart: unless-stopped

volumes:
  fileshare_data: