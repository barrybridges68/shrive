{% load static %}
<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page_title }} | Shrive</title>
    <link rel="stylesheet" href="{% static 'assets/fonts/bootstrap/bootstrap-icons.css' %}">
    <link rel="stylesheet" href="{% static 'assets/css/main.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/fileshare.css' %}">
    <style>
      .upload-shell {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1.25rem;
      }

      .upload-card {
        width: min(42rem, 100%);
      }

      .upload-dropzone {
        border: 2px dashed rgba(255, 255, 255, 0.25);
        border-radius: 0.85rem;
        background: rgba(255, 255, 255, 0.03);
        color: var(--bs-secondary-color);
        text-align: center;
        width: 100%;
        min-height: 16rem;
        padding: 1.25rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        transition: border-color 0.15s ease, background-color 0.15s ease, color 0.15s ease;
        cursor: pointer;
      }

      .upload-dropzone.is-active {
        border-color: var(--bs-success);
        background: rgba(var(--bs-success-rgb), 0.12);
        color: var(--bs-success);
      }

      .upload-dropzone .bi {
        font-size: 3.2rem;
        line-height: 1;
      }
    </style>
  </head>
  <body class="fileshare-body">
    <main class="upload-shell">
      <section class="card border-0 shadow-sm upload-card">
        <div class="card-body p-4 p-md-5">
          <h3 class="mb-1">{{ page_title }}</h3>
          <p class="text-body-secondary mb-4">{{ page_description }}</p>

          {% if messages %}
            <div class="mb-3">
              {% for message in messages %}
                <div class="alert alert-{{ message.tags|default:'info' }} mb-2" role="alert">{{ message }}</div>
              {% endfor %}
            </div>
          {% endif %}

          <form method="post" enctype="multipart/form-data" id="upload-form">
            {% csrf_token %}
            <input type="hidden" name="action" value="upload">
            <input type="file" name="file" id="upload-file-input" class="d-none" multiple>
            <input type="file" name="folder" id="upload-folder-input" class="d-none" webkitdirectory directory multiple>

            <div class="upload-dropzone" id="upload-dropzone" tabindex="0" role="button" aria-label="Drag and drop files here or press Enter to browse">
              <i class="bi bi-cloud-arrow-up"></i>
              <div class="fw-semibold">Drag and drop files here</div>
              <div class="small">or tap to choose files</div>
            </div>

            <div class="d-flex flex-wrap gap-2 justify-content-center mt-3">
              <button type="button" class="btn btn-primary" id="upload-files-button">
                <i class="bi bi-upload me-1"></i>Upload files
              </button>
              <button type="button" class="btn btn-outline-secondary" id="upload-folder-button">
                <i class="bi bi-folder2-open me-1"></i>Upload folder
              </button>
            </div>

            <div class="mt-3 d-none" id="upload-progress-wrap" aria-live="polite">
              <div class="d-flex justify-content-between align-items-center small mb-1">
                <span id="upload-progress-label">Uploading...</span>
                <span id="upload-progress-value">0%</span>
              </div>
              <div class="progress" role="progressbar" aria-label="Upload progress">
                <div class="progress-bar progress-bar-striped progress-bar-animated" id="upload-progress-bar" style="width: 0%"></div>
              </div>
            </div>
          </form>
        </div>
      </section>
    </main>

    <script src="{% static 'assets/js/bootstrap.bundle.min.js' %}"></script>
    <script>
      (function () {
        var form = document.getElementById('upload-form');
        var fileInput = document.getElementById('upload-file-input');
        var folderInput = document.getElementById('upload-folder-input');
        var dropzone = document.getElementById('upload-dropzone');
        var uploadFilesButton = document.getElementById('upload-files-button');
        var uploadFolderButton = document.getElementById('upload-folder-button');
        var progressWrap = document.getElementById('upload-progress-wrap');
        var progressBar = document.getElementById('upload-progress-bar');
        var progressValue = document.getElementById('upload-progress-value');
        var progressLabel = document.getElementById('upload-progress-label');

        if (!form || !fileInput || !folderInput || !dropzone || !progressWrap || !progressBar || !progressValue || !progressLabel) {
          return;
        }

        function setUploading(isUploading) {
          fileInput.disabled = isUploading;
          folderInput.disabled = isUploading;
          dropzone.classList.toggle('disabled', isUploading);
          if (uploadFilesButton) {
            uploadFilesButton.disabled = isUploading;
          }
          if (uploadFolderButton) {
            uploadFolderButton.disabled = isUploading;
          }
        }

        function updateProgress(percent) {
          var safePercent = Math.max(0, Math.min(100, percent));
          progressBar.style.width = safePercent + '%';
          progressValue.textContent = safePercent + '%';
        }

        function getCookie(name) {
          var cookieValue = null;
          if (!document.cookie) {
            return cookieValue;
          }

          var cookies = document.cookie.split(';');
          for (var i = 0; i < cookies.length; i += 1) {
            var cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === name + '=') {
              cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
              break;
            }
          }
          return cookieValue;
        }

        function buildFormData(inputName, files) {
          var formData = new FormData();
          var csrfInput = form.querySelector('input[name="csrfmiddlewaretoken"]');
          if (csrfInput) {
            formData.append('csrfmiddlewaretoken', csrfInput.value);
          }
          formData.append('action', 'upload');

          Array.prototype.forEach.call(files || [], function (file, index) {
            var fieldName = inputName + index;
            var relativePath = file.webkitRelativePath || file.name || '';
            formData.append(fieldName, file, file.name);
            formData.append('upload_path_' + fieldName, relativePath);
          });

          return formData;
        }

        function uploadFiles(inputName, files) {
          if (!files || !files.length) {
            return;
          }

          var xhr = new XMLHttpRequest();
          var csrfToken = getCookie('csrftoken');
          var formData = buildFormData(inputName, files);

          progressWrap.classList.remove('d-none');
          progressLabel.textContent = 'Uploading...';
          updateProgress(0);
          setUploading(true);

          xhr.open('POST', window.location.href, true);
          if (csrfToken) {
            xhr.setRequestHeader('X-CSRFToken', csrfToken);
          }

          xhr.upload.addEventListener('progress', function (event) {
            if (!event.lengthComputable) {
              return;
            }
            updateProgress(Math.round((event.loaded / event.total) * 100));
          });

          xhr.addEventListener('load', function () {
            if (xhr.status >= 200 && xhr.status < 400) {
              updateProgress(100);
              progressLabel.textContent = 'Upload complete';
              window.location.reload();
              return;
            }

            progressLabel.textContent = 'Upload failed';
            setUploading(false);
          });

          xhr.addEventListener('error', function () {
            progressLabel.textContent = 'Upload failed';
            setUploading(false);
          });

          xhr.send(formData);
        }

        function submitWithInput(input, inputName) {
          if (!input.files || !input.files.length) {
            return;
          }
          uploadFiles(inputName, input.files);
        }

        form.addEventListener('submit', function (event) {
          event.preventDefault();
          submitWithInput(fileInput, 'file');
        });

        dropzone.addEventListener('click', function () {
          if (fileInput.disabled) {
            return;
          }
          fileInput.click();
        });

        dropzone.addEventListener('keydown', function (event) {
          if (fileInput.disabled) {
            return;
          }
          if (event.key === 'Enter' || event.key === ' ') {
            event.preventDefault();
            fileInput.click();
          }
        });

        ['dragenter', 'dragover'].forEach(function (eventName) {
          dropzone.addEventListener(eventName, function (event) {
            event.preventDefault();
            if (fileInput.disabled) {
              return;
            }
            dropzone.classList.add('is-active');
          });
        });

        ['dragleave', 'drop'].forEach(function (eventName) {
          dropzone.addEventListener(eventName, function (event) {
            event.preventDefault();
            dropzone.classList.remove('is-active');
          });
        });

        dropzone.addEventListener('drop', function (event) {
          if (fileInput.disabled) {
            return;
          }
          var droppedFiles = event.dataTransfer && event.dataTransfer.files;
          if (!droppedFiles || !droppedFiles.length) {
            return;
          }
          uploadFiles('file', droppedFiles);
        });

        if (uploadFilesButton) {
          uploadFilesButton.addEventListener('click', function () {
            if (fileInput.disabled) {
              return;
            }
            fileInput.click();
          });
        }

        if (uploadFolderButton) {
          uploadFolderButton.addEventListener('click', function () {
            if (folderInput.disabled) {
              return;
            }
            folderInput.click();
          });
        }

        fileInput.addEventListener('change', function () {
          submitWithInput(fileInput, 'file');
        });

        folderInput.addEventListener('change', function () {
          submitWithInput(folderInput, 'folder');
        });

        
      }());
    </script>
  </body>
</html>
