{% load static %}
<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page_title }} | Shrive</title>
    <link rel="stylesheet" href="{% static 'assets/fonts/bootstrap/bootstrap-icons.css' %}">
    <link rel="stylesheet" href="{% static 'assets/css/main.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/fileshare.css' %}">
    <style>
      .upload-shell {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1.25rem;
      }

      .upload-card {
        width: min(42rem, 100%);
      }
    </style>
  </head>
  <body class="fileshare-body">
    <main class="upload-shell">
      <section class="card border-0 shadow-sm upload-card">
        <div class="card-body p-4 p-md-5 text-center">
          <div class="mb-3">
            <i class="bi bi-shield-exclamation text-warning" style="font-size: 2.5rem;"></i>
          </div>
          <h3 class="mb-2">{{ page_title }}</h3>
          <p class="text-body-secondary mb-0">{{ page_description }}</p>
        </div>
      </section>
    </main>
  </body>
</html>
